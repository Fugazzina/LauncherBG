name: Genera Sfondi Ogni Giorno
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa librerie
        run: pip install requests Pillow

      - name: Esegui script
        env:
          TRAKT_ID: ${{ secrets.TRAKT_ID }}
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
          TRAKT_USER: ${{ secrets.TRAKT_USER }}
        run: python crea_cards.py

      - name: Salva immagini nel repository
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add sfondi_projectivity/ || true
          git commit -m "Sfondi aggiornati $(date +%Y-%m-%d)" || echo "Nessuna modifica"
          git push || echo "Nessuna modifica da pushare"
